version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: crew-postgres
    environment:
      POSTGRES_USER: crew
      POSTGRES_PASSWORD: crew_staging
      POSTGRES_DB: crew_staging
    ports:
      - "5432:5432"
    volumes:
      - crew_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crew -d crew_staging"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crew-redis
    ports:
      - "6379:6379"
    volumes:
      - crew_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  crew_pgdata:
  crew_redis:
