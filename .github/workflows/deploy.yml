name: Deploy Crew App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/crew
            git pull origin main
            docker compose -f docker-compose.production.yml --env-file .env.production build --no-cache
            docker compose -f docker-compose.production.yml --env-file .env.production up -d
            # Run schema migrations (safe with IF NOT EXISTS / ADD COLUMN IF NOT EXISTS)
            sleep 3
            docker exec crew-app bun run src/db/setup.ts
            echo "Crew deployed successfully to crew.diisi.dev"
