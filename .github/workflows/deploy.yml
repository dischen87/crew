name: Deploy Crew App

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crew
          POSTGRES_PASSWORD: crew_test
          POSTGRES_DB: crew_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crew -d crew_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd packages/api && bun install
          cd ../web && bun install

      - name: Setup test database
        env:
          DATABASE_URL: postgres://crew:crew_test@localhost:5432/crew_test
          REDIS_URL: redis://localhost:6379
        run: cd packages/api && bun run db:setup

      - name: Start API server
        env:
          DATABASE_URL: postgres://crew:crew_test@localhost:5432/crew_test
          REDIS_URL: redis://localhost:6379
          API_PORT: "3000"
        run: |
          cd packages/api && bun run src/index.ts &
          sleep 2
          curl -f http://localhost:3000/health || exit 1

      - name: Run E2E tests
        env:
          DATABASE_URL: postgres://crew:crew_test@localhost:5432/crew_test
          REDIS_URL: redis://localhost:6379
        run: cd packages/api && bun test

      - name: Build web
        run: cd packages/web && bun run build

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/crew-staging
            git pull origin main
            docker compose -f docker-compose.staging.yml -p crew-staging --env-file .env.staging build --no-cache
            docker compose -f docker-compose.staging.yml -p crew-staging --env-file .env.staging up -d
            sleep 3
            docker exec crew-staging-app bun run src/db/setup.ts
            echo "Crew staging deployed to staging.crew-haus.com"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/crew
            git pull origin main
            docker compose -f docker-compose.production.yml -p crew --env-file .env.production build --no-cache
            docker compose -f docker-compose.production.yml -p crew --env-file .env.production up -d
            sleep 3
            docker exec crew-app bun run src/db/setup.ts
            echo "Crew deployed to crew-haus.com"
