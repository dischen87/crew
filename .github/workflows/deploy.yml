name: Deploy Crew App

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/crew-staging
            git pull origin main
            docker compose -f docker-compose.staging.yml -p crew-staging --env-file .env.staging build --no-cache
            docker compose -f docker-compose.staging.yml -p crew-staging --env-file .env.staging up -d
            sleep 3
            docker exec crew-staging-app bun run src/db/setup.ts
            echo "Crew staging deployed to staging.crew-haus.com"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/crew
            git pull origin main
            docker compose -f docker-compose.production.yml -p crew --env-file .env.production build --no-cache
            docker compose -f docker-compose.production.yml -p crew --env-file .env.production up -d
            sleep 3
            docker exec crew-app bun run src/db/setup.ts
            echo "Crew deployed to crew-haus.com"
