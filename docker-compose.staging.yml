services:
  app:
    build: .
    container_name: crew-staging-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://crew:${DB_PASSWORD}@postgres:5432/crew_staging
      REDIS_URL: redis://redis:6379
      API_PORT: "3000"
      EVENT_PASSWORD: ${EVENT_PASSWORD:-BelekGolf4ever}
      NODE_ENV: staging
    ports:
      - "127.0.0.1:3200:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crew-staging-internal
      - caddy-net

  postgres:
    image: postgres:16-alpine
    container_name: crew-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crew
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: crew_staging
    volumes:
      - crew_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crew -d crew_staging"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crew-staging-internal

  redis:
    image: redis:7-alpine
    container_name: crew-staging-redis
    restart: unless-stopped
    volumes:
      - crew_staging_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crew-staging-internal

volumes:
  crew_staging_pgdata:
  crew_staging_redis:

networks:
  crew-staging-internal:
    driver: bridge
  caddy-net:
    external: true
