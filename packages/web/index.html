<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
    <meta name="description" content="CREW — Die App für Gruppenreisen & Events. Golfrunden, Chat, Flights und mehr." />
    <meta name="theme-color" content="#f0ddf5" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CREW" />

    <!-- OG / Share -->
    <meta property="og:title" content="CREW — Dein Trip. Deine Crew." />
    <meta property="og:description" content="Die App für Gruppenreisen & Events. Golfrunden, Chat, Flights und mehr." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crew-haus.com" />
    <meta property="og:image" content="https://crew-haus.com/icon-512.png" />

    <title>CREW — Dein Trip. Deine Crew. Deine App.</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Viewport height fallback for Android browsers without dvh support.
      // window.innerHeight gives the visible viewport height excluding browser chrome.
      (function(){
        function setHeight(){
          document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }
        setHeight();
        window.addEventListener('resize', setHeight);
        window.addEventListener('orientationchange', function(){ setTimeout(setHeight, 150); });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setHeight);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
